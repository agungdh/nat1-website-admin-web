<div class="tags-header">
  <h2>Tags</h2>
  <button mat-flat-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    Add Tag
  </button>
</div>

@if (loading()) {
  <div class="center-spinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
} @else if (tags().length === 0) {
  <p class="no-data">No tags found.</p>
} @else {
  <table
    mat-table
    [dataSource]="tags()"
    matSort
    (matSortChange)="onSortChange($event)"
    [matSortActive]="sortField()"
    [matSortDirection]="sortDirection()"
  >
    <ng-container matColumnDef="index">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let i = index">{{ page() * pageSize() + i + 1 }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header="name">Name</th>
      <td mat-cell *matCellDef="let tag">{{ tag.name }}</td>
    </ng-container>

    <ng-container matColumnDef="slug">
      <th mat-header-cell *matHeaderCellDef mat-sort-header="slug">Slug</th>
      <td mat-cell *matCellDef="let tag">{{ tag.slug }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let tag">
        <button mat-icon-button color="primary" (click)="openEditDialog(tag)" aria-label="Edit tag">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteTag(tag.uuid, tag.name)" aria-label="Delete tag">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
  </table>

  <mat-paginator
    [length]="totalElements()"
    [pageSize]="pageSize()"
    [pageIndex]="page()"
    [pageSizeOptions]="[5, 10, 25, 50]"
    (page)="onPageChange($event)"
    showFirstLastButtons
  ></mat-paginator>
}
